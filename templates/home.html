<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Husnihat Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Caveat:wght@400;700&family=Charmonman:wght@400;700&family=Kalam:wght@300;400;700&family=Marck+Script&family=Montserrat+Subrayada&family=Nothing+You+Could+Do&family=Permanent+Marker&family=Reenie+Beanie&family=Rock+Salt&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;
background:#dce7f7;
overflow-x:hidden;
color:#1e293b;
}

:root{
--accent:#2563eb;
--bg:#dce7f7;
--panel:#ffffff;
--border:#d2dbec;
}

#app{
min-height:100vh;
display:flex;
flex-direction:column;
}

/* TOP */

.top-box{
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.preview-box{
background:white;
border-radius:18px;
padding:14px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
border:1px solid var(--border);
}

.preview-title{
font-size:12px;
font-weight:700;
color:#64748b;
margin-bottom:8px;
text-transform:uppercase;
}

#previewText{
font-size:24px;
font-family:'Charmonman',cursive;
color:#0000ff;
min-height:42px;
word-break:break-word;
}

/* INPUT */

.input-box{
background:white;
border-radius:18px;
padding:14px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
border:1px solid var(--border);
}

#inputText{
width:100%;
height:140px;
resize:none;
border:none;
outline:none;
font-size:15px;
line-height:1.7;
font-family:monospace;
}

/* PAPER */

.paper-wrap{
padding:12px;
padding-bottom:120px;
}

.paper{
position:relative;
width:100%;
max-width:850px;
margin:auto;
aspect-ratio:1/1.414;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:
0 25px 60px rgba(0,0,0,.20),
inset 0 0 20px rgba(0,0,0,.05);
}

#paperText{
position:absolute;
inset:0;
padding:40px 28px 28px 36px;
white-space:pre-wrap;
font-size:18px;
line-height:2em;
font-family:'Charmonman',cursive;
color:#0000ff;
z-index:2;
word-break:break-word;
overflow:hidden;
}

#marginLine{
display:none;
position:absolute;
top:0;
right:50px;
width:2px;
height:100%;
background:rgba(255,0,0,.4);
z-index:3;
}

/* LINE TYPES */

.paper.lines{
background-image:
linear-gradient(rgba(173,216,230,.7) 1px, transparent 1px);
}

.paper.grid{
background-image:
linear-gradient(rgba(173,216,230,.5) 1px, transparent 1px),
linear-gradient(90deg, rgba(173,216,230,.5) 1px, transparent 1px);
}

.paper.dot{
background-image:
radial-gradient(circle, rgba(173,216,230,.8) 1px, transparent 1px);
}

/* MOBILE TOOLBAR */

.mobile-toolbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(255,255,255,.92);
backdrop-filter:blur(15px);
border-top:1px solid #dbe2ef;
z-index:999;
display:flex;
align-items:center;
padding:10px;
gap:8px;
overflow-x:auto;
}

.mobile-toolbar::-webkit-scrollbar{
display:none;
}

.tool-btn{
flex-shrink:0;
border:none;
background:#edf2ff;
padding:12px 15px;
border-radius:14px;
font-size:14px;
font-weight:700;
cursor:pointer;
color:#1e293b;
}

.tool-btn.blue{
background:var(--accent);
color:white;
}

.next-btn{
min-width:48px;
height:48px;
border-radius:50%;
border:none;
background:#2563eb;
color:white;
font-size:22px;
font-weight:700;
cursor:pointer;
flex-shrink:0;
}

/* DRAWERS */

.drawer{
position:fixed;
left:0;
right:0;
bottom:-100%;
background:#f8fbff;
border-radius:25px 25px 0 0;
padding:20px;
z-index:1200;
max-height:78vh;
overflow:auto;
transition:.35s;
box-shadow:0 -15px 40px rgba(0,0,0,.2);
}

.drawer.open{
bottom:0;
}

.drawer-top{
display:flex;
justify-content:center;
margin-bottom:16px;
}

.drawer-line{
width:60px;
height:5px;
background:#c5d0e5;
border-radius:20px;
}

.group{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:16px;
}

.group label{
font-size:13px;
font-weight:700;
color:#475569;
}

.group select,
.group input[type="color"]{
width:100%;
padding:11px;
border-radius:12px;
border:1px solid #d7deec;
background:white;
font-size:14px;
}

.range-wrap{
display:flex;
align-items:center;
gap:10px;
}

.range-wrap input{
flex:1;
}

.val{
font-size:13px;
font-weight:700;
color:#2563eb;
width:40px;
text-align:right;
}

.closeBtn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:15px;
font-weight:700;
margin-top:8px;
cursor:pointer;
}

/* DESKTOP */

@media(min-width:950px){

body{
overflow:hidden;
}

#app{
display:grid;
grid-template-columns:330px 1fr;
}

.left{
height:100vh;
overflow:auto;
padding-bottom:20px;
border-right:1px solid #d4dceb;
background:#eef4ff;
}

.paper-wrap{
height:100vh;
overflow:auto;
padding:24px;
padding-bottom:100px;
}

.mobile-toolbar{
display:none;
}

.paper{
max-width:760px;
}

#paperText{
font-size:20px;
}

.desktop-settings{
display:block !important;
}

}

.desktop-settings{
display:none;
padding:12px;
}

.desktop-card{
background:white;
border-radius:18px;
padding:14px;
margin-bottom:12px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.download-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#e2574c;
color:white;
font-size:15px;
font-weight:800;
cursor:pointer;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(4px);
display:none;
z-index:1100;
}

.overlay.show{
display:block;
}

</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div id="app">

<div class="left">

<div class="top-box">

<div class="preview-box">
<div class="preview-title">Shrift Preview</div>
<div id="previewText">Salom dunyo</div>
</div>

<div class="input-box">
<div class="preview-title">Matn kiriting</div>
<textarea id="inputText" placeholder="Matnni shu yerga yozing yoki paste qiling..."></textarea>
</div>

</div>

<div class="desktop-settings">

<div class="desktop-card">

<div class="group">
<label>Shrift</label>
<select id="fontSelect">
<option value="'Charmonman', cursive">Charmonman</option>
<option value="'Marck Script', cursive">Marck Script</option>
<option value="'Bad Script', cursive">Bad Script</option>
<option value="'Caveat', cursive">Caveat</option>
<option value="'Kalam', cursive">Kalam</option>
<option value="'Reenie Beanie', cursive">Reenie Beanie</option>
<option value="'Nothing You Could Do', cursive">Nothing You Could Do</option>
<option value="'Rock Salt', cursive">Rock Salt</option>
<option value="'Permanent Marker', sans-serif">Permanent Marker</option>
<option value="'Montserrat Subrayada', sans-serif">Subrayada</option>
</select>
</div>

<div class="group">
<label>Matn kattaligi</label>
<div class="range-wrap">
<input type="range" id="fontSize" min="12" max="40" value="18">
<div class="val" id="fontSizeVal">18</div>
</div>
</div>

<div class="group">
<label>Qator balandligi</label>
<div class="range-wrap">
<input type="range" id="lineHeight" min="1.5" max="4" step="0.1" value="2">
<div class="val" id="lineHeightVal">2</div>
</div>
</div>

<div class="group">
<label>Harflar oralig'i</label>
<div class="range-wrap">
<input type="range" id="letterSpacing" min="0" max="10" step="0.5" value="0">
<div class="val" id="letterVal">0</div>
</div>
</div>

<div class="group">
<label>So'z oralig'i</label>
<div class="range-wrap">
<input type="range" id="wordSpacing" min="0" max="20" value="0">
<div class="val" id="wordVal">0</div>
</div>
</div>

<div class="group">
<label>Matn tepaga/pastga</label>
<div class="range-wrap">
<input type="range" id="topSpacing" min="10" max="180" value="40">
<div class="val" id="topVal">40</div>
</div>
</div>

<div class="group">
<label>Chiziq turi</label>
<select id="lineType">
<option value="none">Oq</option>
<option value="lines">Chiziqli</option>
<option value="grid">Katakli</option>
<option value="dot">Nuqtali</option>
</select>
</div>

<div class="group" id="lineSizeWrap">
<label>Chiziq oralig'i</label>
<div class="range-wrap">
<input type="range" id="lineSize" min="15" max="70" value="32">
<div class="val" id="lineSizeVal">32</div>
</div>
</div>

<div class="group">
<label>Matn rangi</label>
<input type="color" id="textColor" value="#0000ff">
</div>

<div class="group">
<label>Varoq rangi</label>
<input type="color" id="paperColor" value="#ffffff">
</div>

<div class="group">
<label>Qalinlik</label>
<div class="range-wrap">
<input type="range" id="fontWeight" min="100" max="900" step="100" value="400">
<div class="val" id="weightVal">400</div>
</div>
</div>

<div class="group">
<label>
<input type="checkbox" id="shadowToggle" checked>
 Soya
</label>
</div>

<div class="group">
<label>
<input type="checkbox" id="marginToggle">
 Hoshiya
</label>
</div>

<button class="download-btn" id="downloadBtn">
⬇ Yuklab olish
</button>

</div>

</div>

</div>

<div class="paper-wrap">

<div class="paper" id="paper">

<div id="marginLine"></div>

<div id="paperText">
Qo'lyozmaga aylantirmoqchi bo'lgan matningizni shu yerga yozing...
</div>

</div>

</div>

</div>

<!-- MOBILE TOOLBAR -->

<div class="mobile-toolbar">

<button class="tool-btn" onclick="openDrawer('drawer1')">✏️ Text</button>

<button class="tool-btn" onclick="openDrawer('drawer2')">🎨 Style</button>

<button class="tool-btn" onclick="openDrawer('drawer3')">📄 Varoq</button>

<button class="tool-btn" onclick="openDrawer('drawer4')">⚙️ Extra</button>

<button class="next-btn">></button>

<button class="tool-btn blue" id="mobileDownload">
⬇
</button>

</div>

<!-- DRAWER 1 -->

<div class="drawer" id="drawer1">

<div class="drawer-top">
<div class="drawer-line"></div>
</div>

<div class="group">
<label>Shrift</label>
<select id="mFont"></select>
</div>

<div class="group">
<label>Kattalik</label>
<div class="range-wrap">
<input type="range" id="mFontSize" min="12" max="40" value="18">
<div class="val" id="mFontVal">18</div>
</div>
</div>

<div class="group">
<label>Qalinlik</label>
<div class="range-wrap">
<input type="range" id="mWeight" min="100" max="900" step="100" value="400">
<div class="val" id="mWeightVal">400</div>
</div>
</div>

<button class="closeBtn" onclick="closeDrawers()">Yopish</button>

</div>

<!-- DRAWER 2 -->

<div class="drawer" id="drawer2">

<div class="drawer-top">
<div class="drawer-line"></div>
</div>

<div class="group">
<label>Qator balandligi</label>
<div class="range-wrap">
<input type="range" id="mLineHeight" min="1.5" max="4" step="0.1" value="2">
<div class="val" id="mLineVal">2</div>
</div>
</div>

<div class="group">
<label>Harf oralig'i</label>
<div class="range-wrap">
<input type="range" id="mLetter" min="0" max="10" step="0.5" value="0">
<div class="val" id="mLetterVal">0</div>
</div>
</div>

<div class="group">
<label>So'z oralig'i</label>
<div class="range-wrap">
<input type="range" id="mWord" min="0" max="20" value="0">
<div class="val" id="mWordVal">0</div>
</div>
</div>

<button class="closeBtn" onclick="closeDrawers()">Yopish</button>

</div>

<!-- DRAWER 3 -->

<div class="drawer" id="drawer3">

<div class="drawer-top">
<div class="drawer-line"></div>
</div>

<div class="group">
<label>Chiziq turi</label>
<select id="mLineType">
<option value="none">Oq</option>
<option value="lines">Chiziqli</option>
<option value="grid">Katakli</option>
<option value="dot">Nuqtali</option>
</select>
</div>

<div class="group">
<label>Chiziq oralig'i</label>
<div class="range-wrap">
<input type="range" id="mLineSize" min="15" max="70" value="32">
<div class="val" id="mLineSizeVal">32</div>
</div>
</div>

<div class="group">
<label>Varoq rangi</label>
<input type="color" id="mPaperColor" value="#ffffff">
</div>

<div class="group">
<label>Matn rangi</label>
<input type="color" id="mTextColor" value="#0000ff">
</div>

<button class="closeBtn" onclick="closeDrawers()">Yopish</button>

</div>

<!-- DRAWER 4 -->

<div class="drawer" id="drawer4">

<div class="drawer-top">
<div class="drawer-line"></div>
</div>

<div class="group">
<label>Matn tepaga/pastga</label>
<div class="range-wrap">
<input type="range" id="mTop" min="10" max="180" value="40">
<div class="val" id="mTopVal">40</div>
</div>
</div>

<div class="group">
<label>
<input type="checkbox" id="mShadow" checked>
 Qog'oz soyasi
</label>
</div>

<div class="group">
<label>
<input type="checkbox" id="mMargin">
 Hoshiya
</label>
</div>

<button class="closeBtn" onclick="closeDrawers()">Yopish</button>

</div>

<script>

const inputText = document.getElementById("inputText");
const paperText = document.getElementById("paperText");
const previewText = document.getElementById("previewText");
const paper = document.getElementById("paper");
const overlay = document.getElementById("overlay");

const fontSelect = document.getElementById("fontSelect");
const mFont = document.getElementById("mFont");

mFont.innerHTML = fontSelect.innerHTML;

inputText.addEventListener("input",()=>{

const val = inputText.value.trim();

paperText.textContent = val || "Qo'lyozmaga aylantirmoqchi bo'lgan matningizni shu yerga yozing...";
previewText.textContent = val || "Salom dunyo";

});

function syncRange(id,valId,callback){

const el = document.getElementById(id);
const val = document.getElementById(valId);

el.addEventListener("input",()=>{

val.textContent = el.value;

callback(el.value);

});

}

function applyLineType(type){

paper.classList.remove("lines","grid","dot");

if(type !== "none"){
paper.classList.add(type);
}

updateLineSize();

}

function updateLineSize(){

const size =
document.getElementById("lineSize").value;

if(paper.classList.contains("lines")){
paper.style.backgroundSize = "100% "+size+"px";
}

if(paper.classList.contains("grid")){
paper.style.backgroundSize = size+"px "+size+"px";
}

if(paper.classList.contains("dot")){
paper.style.backgroundSize = size+"px "+size+"px";
}

}

/* DESKTOP */

fontSelect.addEventListener("change",()=>{

paperText.style.fontFamily = fontSelect.value;
previewText.style.fontFamily = fontSelect.value;

});

syncRange("fontSize","fontSizeVal",(v)=>{
paperText.style.fontSize = v+"px";
previewText.style.fontSize = v+"px";
});

syncRange("lineHeight","lineHeightVal",(v)=>{
paperText.style.lineHeight = v+"em";
});

syncRange("letterSpacing","letterVal",(v)=>{
paperText.style.letterSpacing = v+"px";
});

syncRange("wordSpacing","wordVal",(v)=>{
paperText.style.wordSpacing = v+"px";
});

syncRange("topSpacing","topVal",(v)=>{
paperText.style.paddingTop = v+"px";
});

syncRange("lineSize","lineSizeVal",(v)=>{
updateLineSize();
});

syncRange("fontWeight","weightVal",(v)=>{
paperText.style.fontWeight = v;
});

document.getElementById("lineType")
.addEventListener("change",(e)=>{
applyLineType(e.target.value);
});

document.getElementById("textColor")
.addEventListener("input",(e)=>{
paperText.style.color = e.target.value;
previewText.style.color = e.target.value;
});

document.getElementById("paperColor")
.addEventListener("input",(e)=>{
paper.style.backgroundColor = e.target.value;
});

document.getElementById("shadowToggle")
.addEventListener("change",(e)=>{

paper.style.boxShadow =
e.target.checked
?
"0 25px 60px rgba(0,0,0,.20), inset 0 0 20px rgba(0,0,0,.05)"
:
"none";

});

document.getElementById("marginToggle")
.addEventListener("change",(e)=>{

document.getElementById("marginLine")
.style.display =
e.target.checked ? "block" : "none";

});

/* MOBILE */

mFont.addEventListener("change",()=>{

paperText.style.fontFamily = mFont.value;
previewText.style.fontFamily = mFont.value;

});

syncRange("mFontSize","mFontVal",(v)=>{
paperText.style.fontSize = v+"px";
previewText.style.fontSize = v+"px";
});

syncRange("mWeight","mWeightVal",(v)=>{
paperText.style.fontWeight = v;
});

syncRange("mLineHeight","mLineVal",(v)=>{
paperText.style.lineHeight = v+"em";
});

syncRange("mLetter","mLetterVal",(v)=>{
paperText.style.letterSpacing = v+"px";
});

syncRange("mWord","mWordVal",(v)=>{
paperText.style.wordSpacing = v+"px";
});

syncRange("mTop","mTopVal",(v)=>{
paperText.style.paddingTop = v+"px";
});

document.getElementById("mLineType")
.addEventListener("change",(e)=>{
applyLineType(e.target.value);
});

syncRange("mLineSize","mLineSizeVal",(v)=>{
document.getElementById("lineSize").value = v;
updateLineSize();
});

document.getElementById("mPaperColor")
.addEventListener("input",(e)=>{
paper.style.backgroundColor = e.target.value;
});

document.getElementById("mTextColor")
.addEventListener("input",(e)=>{
paperText.style.color = e.target.value;
previewText.style.color = e.target.value;
});

document.getElementById("mShadow")
.addEventListener("change",(e)=>{

paper.style.boxShadow =
e.target.checked
?
"0 25px 60px rgba(0,0,0,.20), inset 0 0 20px rgba(0,0,0,.05)"
:
"none";

});

document.getElementById("mMargin")
.addEventListener("change",(e)=>{

document.getElementById("marginLine")
.style.display =
e.target.checked ? "block" : "none";

});

/* DRAWERS */

function openDrawer(id){

closeDrawers();

document.getElementById(id)
.classList.add("open");

overlay.classList.add("show");

document.body.style.overflow="hidden";

}

function closeDrawers(){

document.querySelectorAll(".drawer")
.forEach(d=>{
d.classList.remove("open");
});

overlay.classList.remove("show");

document.body.style.overflow="";

}

overlay.onclick = closeDrawers;

/* DOWNLOAD */

function downloadPaper(){

const btns = document.querySelectorAll(".download-btn,#mobileDownload");

btns.forEach(b=>{
b.innerHTML="⏳";
});

html2canvas(paper,{
scale:3,
useCORS:true,
backgroundColor:"#ffffff"
}).then(canvas=>{

const link = document.createElement("a");

link.href = canvas.toDataURL("image/jpeg",0.97);

link.download =
"husnihat_"+Date.now()+".jpg";

link.click();

}).finally(()=>{

btns.forEach(b=>{
b.innerHTML="⬇";
});

});

}

document.getElementById("downloadBtn")
.addEventListener("click",downloadPaper);

document.getElementById("mobileDownload")
.addEventListener("click",downloadPaper);

/* INIT */

applyLineType("none");

</script>

</body>
</html>
