<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Husnihat Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Caveat:wght@400;700&family=Charmonman:wght@400;700&family=Kalam:wght@300;400;700&family=Marck+Script&family=Montserrat+Subrayada&family=Reenie+Beanie&family=Nothing+You+Could+Do&family=Permanent+Marker&family=Rock+Salt&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#dce6f5;
--panel:#ffffff;
--accent:#2563eb;
--accent2:#e2574c;
--text:#1e293b;
--muted:#64748b;
--radius:18px;
}

html,body{
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#dce6f5,#eef4ff);
color:var(--text);
}

#app{
display:grid;
grid-template-columns:1fr 260px 1fr;
height:100vh;
}

/* LEFT */

#left-col{
padding:18px;
display:flex;
flex-direction:column;
gap:10px;
transition:.25s;
}

#col-title{
font-size:12px;
font-weight:800;
letter-spacing:.08em;
text-transform:uppercase;
color:var(--muted);
}

#input-matn{
flex:1;

background:#fff8c5;

border:
1px solid rgba(0,0,0,.06);

box-shadow:
0 8px 25px rgba(0,0,0,.08);

border-radius:16px;

padding:18px;

font-size:15px;
line-height:1.8;

resize:none;
outline:none;

color:#111;
}

/* SETTINGS */

#settings-col{
background:#f6f8ff;
border-left:1px solid rgba(0,0,0,.05);
border-right:1px solid rgba(0,0,0,.05);

display:flex;
flex-direction:column;
overflow:hidden;
}

#settings-header{
padding:16px;
font-size:13px;
font-weight:800;
border-bottom:1px solid rgba(0,0,0,.06);
}

#settings-scroll{
flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:14px;
}

.sg{
display:flex;
flex-direction:column;
gap:6px;
}

.sg label{
font-size:11px;
font-weight:800;
text-transform:uppercase;
color:var(--muted);
}

.sg select,
.sg input[type="color"]{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #dbe3f0;
background:white;
font-size:14px;
}

.range-row{
display:flex;
align-items:center;
gap:10px;
}

.range-row input{
flex:1;
}

.range-val{
font-size:12px;
font-weight:700;
color:var(--accent);
}

#btn-yopish{
padding:12px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:800;
cursor:pointer;
}

/* RIGHT */

#right-col{
padding:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
gap:14px;
}

#varoq-wrap{
flex:1;
width:100%;
display:flex;
justify-content:center;
align-items:flex-start;
overflow:hidden;
}

#a4-sizer{
width:100%;
max-width:520px;
position:relative;
}

#a4-sizer::before{
content:'';
display:block;
padding-top:141.4%;
}

#oq-varoq{
position:absolute;
inset:0;

background:
linear-gradient(
rgba(255,255,255,.92),
rgba(250,250,250,.96)
);

border-radius:8px;

overflow:hidden;

box-shadow:
0 20px 60px rgba(0,0,0,.18),
inset 0 0 30px rgba(0,0,0,.05);
}

#output-matn{
position:absolute;
inset:0;

padding:
40px
28px
24px
36px;

font-family:'Charmonman',cursive;

font-size:17px;

line-height:2em;

white-space:pre-wrap;

color:#0000ff;

overflow:hidden;
}

#btn-yuklab{
width:100%;
max-width:340px;

padding:14px;

border:none;
border-radius:14px;

background:linear-gradient(
135deg,
#e2574c,
#ff6a5f
);

color:white;

font-size:15px;
font-weight:800;

cursor:pointer;

box-shadow:
0 8px 24px rgba(226,87,76,.35);
}

/* MOBILE */

#mob-fab{
display:none;

position:fixed;
bottom:82px;
right:16px;

width:58px;
height:58px;

border:none;
border-radius:50%;

background:linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:white;

font-size:24px;

cursor:pointer;

z-index:300;

box-shadow:
0 10px 30px rgba(37,99,235,.4);
}

#mob-overlay{
display:none;

position:fixed;
inset:0;

background:rgba(0,0,0,.4);

backdrop-filter:blur(2px);

z-index:200;
}

#mob-drawer{
position:fixed;
left:0;
right:0;
bottom:0;

background:rgba(255,255,255,0.82);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-top:
1px solid rgba(255,255,255,0.4);

box-shadow:
0 -10px 40px rgba(0,0,0,0.18);

border-radius:24px 24px 0 0;

padding:14px;

max-height:58vh;

overflow-y:auto;

display:flex;
flex-direction:column;
gap:14px;

transform:translateY(100%);
transition:.3s ease;

z-index:250;
}

#mob-drawer.open{
transform:translateY(0);
}

.drawer-handle{
width:58px;
height:5px;
border-radius:999px;

background:
linear-gradient(
to right,
#cbd5e1,
#94a3b8
);

margin:auto;
}

@media(max-width:860px){

html,body{
overflow:auto;
}

#app{
display:flex;
flex-direction:column;
height:auto;
}

#settings-col{
display:none;
}

#mob-fab{
display:flex;
align-items:center;
justify-content:center;
}

#left-col{
padding:12px;
}

#input-matn{
min-height:90px;
max-height:140px;
flex:none;
}

#right-col{
padding:4px 8px 90px;
}

#a4-sizer{
max-width:100%;
}

#output-matn{
font-size:13px;
padding:24px 16px 16px 22px;
}

#btn-yuklab{
position:fixed;
bottom:12px;
left:12px;
right:12px;

width:auto;
max-width:none;

z-index:100;
}

#mob-drawer{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.drawer-handle,
#btn-yopish-mob{
grid-column:1/-1;
}
}

</style>
</head>
<body>

<div id="app">

<div id="left-col">

<div id="col-title">
✏️ MATN KIRITING
</div>

<textarea id="input-matn" placeholder="Qo'lyozmaga aylantirmoqchi bo'lgan matningizni shu yerga yozing..."></textarea>

</div>

<!-- SETTINGS PC -->

<div id="settings-col">

<div id="settings-header">
⚙️ SOZLAMALAR
</div>

<div id="settings-scroll">

<div class="sg">
<label>Shrift</label>

<select id="select-shrift">
<option value="'Charmonman', cursive">Charmonman</option>
<option value="'Marck Script', cursive">Marck Script</option>
<option value="'Bad Script', cursive">Bad Script</option>
<option value="'Caveat', cursive">Caveat</option>
<option value="'Kalam', cursive">Kalam</option>
</select>
</div>

<div class="sg">
<label>Matn kattaligi</label>

<select id="select-size">
<option value="14px">14</option>
<option value="15px">15</option>
<option value="16px">16</option>
<option value="17px" selected>17</option>
<option value="18px">18</option>
<option value="20px">20</option>
</select>
</div>

<div class="sg">
<label>Qator balandligi</label>

<div class="range-row">
<input type="range" id="slider-lh" min="1.5" max="3.5" step="0.1" value="2">
<span class="range-val" id="val-lh">2</span>
</div>
</div>

<div class="sg">
<label>Matn rangi</label>
<input type="color" id="picker-matn" value="#0000ff">
</div>

<div class="sg">
<label>Varoq rangi</label>
<input type="color" id="picker-varoq" value="#ffffff">
</div>

<button id="btn-yopish">
✔ YOPISH
</button>

</div>
</div>

<!-- RIGHT -->

<div id="right-col">

<div id="varoq-wrap">

<div id="a4-sizer">

<div id="oq-varoq">

<div id="output-matn">
Qo'lyozmaga aylantirmoqchi bo'lgan matningizni shu yerga yozing...
</div>

</div>

</div>

</div>

<button id="btn-yuklab">
⬇ YUKLAB OLISH
</button>

</div>

</div>

<!-- MOBILE -->

<button id="mob-fab" onclick="openDrawer()">
⚙
</button>

<div id="mob-overlay" onclick="closeDrawer()"></div>

<div id="mob-drawer">

<div class="drawer-handle"></div>

<div class="sg">
<label>Shrift</label>

<select id="m-shrift">
<option value="'Charmonman', cursive">Charmonman</option>
<option value="'Marck Script', cursive">Marck Script</option>
<option value="'Bad Script', cursive">Bad Script</option>
<option value="'Caveat', cursive">Caveat</option>
</select>
</div>

<div class="sg">
<label>Matn kattaligi</label>

<select id="m-size">
<option value="14px">14</option>
<option value="15px">15</option>
<option value="16px">16</option>
<option value="18px">18</option>
</select>
</div>

<div class="sg">
<label>Matn rangi</label>

<input type="color" id="m-color" value="#0000ff">
</div>

<div class="sg">
<label>Varoq rangi</label>

<input type="color" id="m-paper" value="#ffffff">
</div>

<div class="sg">
<label>Qator balandligi</label>

<div class="range-row">
<input type="range" id="m-lh" min="1.5" max="3.5" step="0.1" value="2">
<span class="range-val" id="m-lh-val">2</span>
</div>
</div>

<button id="btn-yopish-mob" onclick="closeDrawer()"
style="
padding:12px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:800;
">
✔ YOPISH
</button>

</div>

<script>

const inputMatn=document.getElementById('input-matn');
const outputMatn=document.getElementById('output-matn');
const oqVaroq=document.getElementById('oq-varoq');

function $(id){
return document.getElementById(id);
}

inputMatn.addEventListener('input',function(){

const val=this.value;

outputMatn.textContent=
val ||
"Qo'lyozmaga aylantirmoqchi bo'lgan matningizni shu yerga yozing...";

});

/* PC */

$('select-shrift').addEventListener('change',e=>{
outputMatn.style.fontFamily=e.target.value;
});

$('select-size').addEventListener('change',e=>{
outputMatn.style.fontSize=e.target.value;
});

$('picker-matn').addEventListener('input',e=>{
outputMatn.style.color=e.target.value;
});

$('picker-varoq').addEventListener('input',e=>{
oqVaroq.style.background=e.target.value;
});

$('slider-lh').addEventListener('input',e=>{

outputMatn.style.lineHeight=e.target.value+'em';

$('val-lh').textContent=e.target.value;

});

/* MOBILE */

$('m-shrift').addEventListener('change',e=>{
outputMatn.style.fontFamily=e.target.value;
});

$('m-size').addEventListener('change',e=>{
outputMatn.style.fontSize=e.target.value;
});

$('m-color').addEventListener('input',e=>{
outputMatn.style.color=e.target.value;
});

$('m-paper').addEventListener('input',e=>{
oqVaroq.style.background=e.target.value;
});

$('m-lh').addEventListener('input',e=>{

outputMatn.style.lineHeight=e.target.value+'em';

$('m-lh-val').textContent=e.target.value;

});

/* DRAWER */

function openDrawer(){

$('mob-drawer').classList.add('open');

$('mob-overlay').style.display='block';

document.body.style.overflow='hidden';

document.getElementById('left-col')
.style.transform='scale(.96)';
}

function closeDrawer(){

$('mob-drawer').classList.remove('open');

$('mob-overlay').style.display='none';

document.body.style.overflow='';

document.getElementById('left-col')
.style.transform='';
}

/* DOWNLOAD */

$('btn-yuklab').addEventListener('click',function(){

const btn=this;

btn.innerHTML='⏳ Tayyorlanmoqda...';

btn.disabled=true;

html2canvas(oqVaroq,{
scale:3,
useCORS:true,
backgroundColor:'#ffffff'
})
.then(canvas=>{

const a=document.createElement('a');

a.href=canvas.toDataURL('image/jpeg',0.96);

a.download='husnihat.jpg';

a.click();

})
.finally(()=>{

btn.innerHTML='⬇ YUKLAB OLISH';

btn.disabled=false;

});

});

</script>
</body>
</html>
