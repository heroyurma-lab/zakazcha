<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Husnihat Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Caveat:wght@400;700&family=Charmonman:wght@400;700&family=Kalam:wght@300;400;700&family=Marck+Script&family=Montserrat+Subrayada&family=Reenie+Beanie&family=Nothing+You+Could+Do&family=Permanent+Marker&family=Rock+Salt&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#dce6f5;
--panel:#ffffff;
--accent:#2563eb;
--accent2:#e2574c;
--text:#1e293b;
--muted:#64748b;
--radius:18px;
}

html,body{
height:100%;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#dce6f5,#eef4ff);
}

/* APP */

#app{
display:grid;
grid-template-columns:1fr 260px 1fr;
height:100vh;
}

/* LEFT */

#left-col{
padding:18px;
display:flex;
flex-direction:column;
gap:10px;
}

#col-title{
font-size:12px;
font-weight:800;
letter-spacing:.08em;
text-transform:uppercase;
color:#64748b;
}

#input-matn{
flex:1;

background:#fff8c5;

border:
1px solid rgba(0,0,0,.06);

box-shadow:
0 8px 25px rgba(0,0,0,.08);

border-radius:16px;

padding:18px;

font-size:15px;
line-height:1.8;

resize:none;
outline:none;

color:#111;
}

/* SETTINGS */

#settings-col{
background:#f7f9ff;
border-left:1px solid rgba(0,0,0,.05);
border-right:1px solid rgba(0,0,0,.05);

display:flex;
flex-direction:column;
overflow:hidden;
}

#settings-header{
padding:16px;
font-size:13px;
font-weight:800;
border-bottom:1px solid rgba(0,0,0,.05);
}

#settings-scroll{
flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:14px;
}

.sg{
display:flex;
flex-direction:column;
gap:6px;

background:#fff;
padding:12px;

border-radius:16px;

border:
1px solid rgba(0,0,0,.05);
}

.sg label{
font-size:11px;
font-weight:800;
text-transform:uppercase;
letter-spacing:.05em;
color:#64748b;
}

.sg select,
.sg input[type="color"]{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #dbe3f0;
background:#fff;
font-size:14px;
}

.range-row{
display:flex;
align-items:center;
gap:10px;
}

.range-row input{
flex:1;
}

.range-val{
font-size:12px;
font-weight:700;
color:#2563eb;
}

.color-circles{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:6px;
}

.cc{
width:24px;
height:24px;
border-radius:50%;
cursor:pointer;
border:2px solid rgba(0,0,0,.08);
}

/* RIGHT */

#right-col{
padding:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
gap:14px;
}

#varoq-wrap{
flex:1;
width:100%;
display:flex;
justify-content:center;
overflow:hidden;
}

#a4-sizer{
width:100%;
max-width:520px;
position:relative;
}

#a4-sizer::before{
content:'';
display:block;
padding-top:141.4%;
}

#oq-varoq{
position:absolute;
inset:0;

background:#fff;

border-radius:10px;

overflow:hidden;

box-shadow:
0 20px 60px rgba(0,0,0,.18),
inset 0 0 30px rgba(0,0,0,.04);
}

#hoshiya{
display:none;

position:absolute;
top:0;
right:52px;

width:1.5px;
height:100%;

background:rgba(255,80,60,.55);

z-index:2;
}

#output-matn{
position:absolute;
inset:0;

padding:
40px
28px
24px
36px;

font-family:'Charmonman',cursive;

font-size:17px;

line-height:2em;

white-space:pre-wrap;

color:#0000ff;

overflow:hidden;
}

/* CHIZIQ */

#oq-varoq.ona-tili-fon{
background-image:
linear-gradient(
rgba(173,216,230,.6) 1.5px,
transparent 1.5px
);
}

#oq-varoq.matematika-fon{
background-image:
linear-gradient(rgba(173,216,230,.5) 1px,transparent 1px),
linear-gradient(90deg,rgba(173,216,230,.5) 1px,transparent 1px);
}

#oq-varoq.doira-fon{
background-image:
radial-gradient(circle,rgba(173,216,230,.7) 1px,transparent 1px);
}

/* DOWNLOAD */

#btn-yuklab{
width:100%;
max-width:340px;

padding:14px;

border:none;
border-radius:16px;

background:
linear-gradient(
135deg,
#e2574c,
#ff6a5f
);

color:#fff;

font-size:15px;
font-weight:800;

cursor:pointer;

box-shadow:
0 8px 24px rgba(226,87,76,.35);
}

/* MOBILE */

#mob-fab{
display:none;

position:fixed;

right:14px;
bottom:78px;

width:60px;
height:60px;

border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

color:#fff;

font-size:24px;

cursor:pointer;

z-index:500;

box-shadow:
0 10px 30px rgba(37,99,235,.35);
}

#mob-drawer{

position:fixed;

top:0;
right:0;
bottom:0;

width:92vw;
max-width:420px;

background:
rgba(255,255,255,.98);

z-index:400;

padding:14px;

overflow-y:auto;

display:flex;
flex-direction:column;
gap:14px;

transform:translateX(105%);

transition:
transform .28s ease;

box-shadow:
-10px 0 40px rgba(0,0,0,.12);
}

#mob-drawer.open{
transform:translateX(0);
}

.mob-top{
display:flex;
align-items:center;
justify-content:space-between;
}

.mob-title{
font-size:14px;
font-weight:800;
letter-spacing:.08em;
color:#64748b;
}

.mob-close{
width:38px;
height:38px;
border:none;
border-radius:12px;
background:#eef2ff;
font-size:18px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:860px){

html,body{
overflow:auto;
}

#app{
display:flex;
flex-direction:column;
height:auto;
}

#settings-col{
display:none;
}

#mob-fab{
display:flex;
align-items:center;
justify-content:center;
}

#left-col{
padding:10px 10px 4px;
}

#input-matn{
min-height:95px;
max-height:130px;
flex:none;
font-size:14px;
}

#right-col{
padding:2px 6px 90px;
}

#a4-sizer{
max-width:100%;
}

#output-matn{
font-size:13px;

padding:
22px
14px
14px
18px;
}

#btn-yuklab{
position:fixed;

left:10px;
right:10px;
bottom:10px;

width:auto;
max-width:none;

z-index:300;
}
}

</style>
</head>

<body>

<div id="app">

<!-- LEFT -->

<div id="left-col">

<div id="col-title">
✏️ MATN KIRITING
</div>

<textarea id="input-matn" placeholder="Matn yozing..."></textarea>

</div>

<!-- SETTINGS PC -->

<div id="settings-col">

<div id="settings-header">
⚙️ SOZLAMALAR
</div>

<div id="settings-scroll"></div>

</div>

<!-- RIGHT -->

<div id="right-col">

<div id="varoq-wrap">

<div id="a4-sizer">

<div id="oq-varoq">

<div id="hoshiya"></div>

<div id="output-matn">
Qo'lyozmaga aylantirmoqchi bo'lgan matningizni shu yerga yozing...
</div>

</div>

</div>

</div>

<button id="btn-yuklab">
⬇ YUKLAB OLISH
</button>

</div>

</div>

<!-- MOBILE -->

<button id="mob-fab" onclick="openDrawer()">
⚙
</button>

<div id="mob-drawer">

<div class="mob-top">

<div class="mob-title">
⚙ SOZLAMALAR
</div>

<button class="mob-close" onclick="closeDrawer()">
✕
</button>

</div>

<div id="mob-settings"></div>

</div>

<script>

const inputMatn=document.getElementById('input-matn');
const outputMatn=document.getElementById('output-matn');
const oqVaroq=document.getElementById('oq-varoq');
const hoshiya=document.getElementById('hoshiya');

function $(id){
return document.getElementById(id);
}

/* SETTINGS HTML */

const settingsHTML = `

<div class="sg">
<label>Shrift</label>

<select id="select-shrift">

<option value="'Charmonman', cursive">Charmonman</option>
<option value="'Marck Script', cursive">Marck Script</option>
<option value="'Bad Script', cursive">Bad Script</option>
<option value="'Caveat', cursive">Caveat</option>
<option value="'Kalam', cursive">Kalam</option>

<option value="'Reenie Beanie', cursive">Reenie Beanie</option>

<option value="'Nothing You Could Do', cursive">
Nothing You Could Do
</option>

<option value="'Rock Salt', cursive">
Rock Salt
</option>

<option value="'Permanent Marker', sans-serif">
Permanent Marker
</option>

<option value="'Montserrat Subrayada', sans-serif">
Subrayada
</option>

</select>
</div>

<div class="sg">
<label>Matn kattaligi</label>

<select id="select-size">

<option value="13px">13</option>
<option value="14px">14</option>
<option value="15px">15</option>
<option value="16px">16</option>
<option value="17px" selected>17</option>
<option value="18px">18</option>
<option value="20px">20</option>
<option value="22px">22</option>
<option value="24px">24</option>

</select>
</div>

<div class="sg">
<label>Matn qalinligi</label>

<div class="range-row">

<input type="range"
id="slider-weight"
min="100"
max="900"
step="100"
value="400">

<span class="range-val" id="val-weight">
400
</span>

</div>
</div>

<div class="sg">
<label>Harflar yaqinligi</label>

<div class="range-row">

<input type="range"
id="slider-letter"
min="0"
max="6"
step="0.5"
value="0">

<span class="range-val" id="val-letter">
0
</span>

</div>
</div>

<div class="sg">
<label>So'zlar yaqinligi</label>

<div class="range-row">

<input type="range"
id="slider-word"
min="0"
max="12"
step="1"
value="0">

<span class="range-val" id="val-word">
0
</span>

</div>
</div>

<div class="sg">
<label>Qator balandligi</label>

<div class="range-row">

<input type="range"
id="slider-lh"
min="1.5"
max="3.5"
step="0.1"
value="2">

<span class="range-val" id="val-lh">
2
</span>

</div>
</div>

<div class="sg">
<label>Matn pozitsiyasi</label>

<div class="range-row">

<input type="range"
id="slider-top"
min="10"
max="150"
step="2"
value="40">

<span class="range-val" id="val-top">
40
</span>

</div>
</div>

<div class="sg">
<label>Chiziq turi</label>

<select id="select-chiziq">

<option value="oq">Bo'sh oq</option>
<option value="ona-tili">Chiziqli</option>
<option value="matematika">Katakli</option>
<option value="doira">Nuqtali</option>

</select>

</div>

<div class="sg">
<label>Matn rangi</label>

<input type="color"
id="picker-matn"
value="#0000ff">

</div>

<div class="sg">
<label>Varoq rangi</label>

<input type="color"
id="picker-varoq"
value="#ffffff">

</div>

<div class="sg">
<label>Qog'oz soyasi</label>

<input type="checkbox"
id="tog-soya"
checked>

</div>

<div class="sg">
<label>Hoshiya</label>

<input type="checkbox"
id="tog-hoshiya">

</div>

`;

document.getElementById('settings-scroll').innerHTML=settingsHTML;
document.getElementById('mob-settings').innerHTML=settingsHTML;

/* TEXT */

inputMatn.addEventListener('input',()=>{

outputMatn.textContent=
inputMatn.value ||
"Qo'lyozmaga aylantirmoqchi bo'lgan matningizni shu yerga yozing...";

});

/* FUNCTIONS */

document.addEventListener('change',e=>{

if(e.target.id==="select-shrift"){
outputMatn.style.fontFamily=e.target.value;
}

if(e.target.id==="select-size"){
outputMatn.style.fontSize=e.target.value;
}

if(e.target.id==="select-chiziq"){

oqVaroq.classList.remove(
'ona-tili-fon',
'matematika-fon',
'doira-fon'
);

if(e.target.value==="ona-tili"){
oqVaroq.classList.add('ona-tili-fon');
oqVaroq.style.backgroundSize='100% 32px';
}

if(e.target.value==="matematika"){
oqVaroq.classList.add('matematika-fon');
oqVaroq.style.backgroundSize='32px 32px';
}

if(e.target.value==="doira"){
oqVaroq.classList.add('doira-fon');
oqVaroq.style.backgroundSize='26px 26px';
}
}

if(e.target.id==="picker-matn"){
outputMatn.style.color=e.target.value;
}

if(e.target.id==="picker-varoq"){
oqVaroq.style.backgroundColor=e.target.value;
}

if(e.target.id==="tog-soya"){

oqVaroq.style.boxShadow=
e.target.checked
?
'0 20px 60px rgba(0,0,0,.18), inset 0 0 30px rgba(0,0,0,.04)'
:
'none';
}

if(e.target.id==="tog-hoshiya"){

hoshiya.style.display=
e.target.checked
?
'block'
:
'none';
}

});

/* RANGE */

document.addEventListener('input',e=>{

if(e.target.id==="slider-weight"){

outputMatn.style.fontWeight=e.target.value;

$('val-weight').textContent=e.target.value;
}

if(e.target.id==="slider-letter"){

outputMatn.style.letterSpacing=
e.target.value+'px';

$('val-letter').textContent=e.target.value;
}

if(e.target.id==="slider-word"){

outputMatn.style.wordSpacing=
e.target.value+'px';

$('val-word').textContent=e.target.value;
}

if(e.target.id==="slider-lh"){

outputMatn.style.lineHeight=
e.target.value+'em';

$('val-lh').textContent=e.target.value;
}

if(e.target.id==="slider-top"){

outputMatn.style.paddingTop=
e.target.value+'px';

$('val-top').textContent=e.target.value;
}

});

/* DRAWER */

function openDrawer(){
$('mob-drawer').classList.add('open');
}

function closeDrawer(){
$('mob-drawer').classList.remove('open');
}

/* DOWNLOAD */

$('btn-yuklab').addEventListener('click',function(){

const btn=this;

btn.innerHTML='⏳ Tayyorlanmoqda...';

btn.disabled=true;

html2canvas(oqVaroq,{
scale:3,
useCORS:true,
backgroundColor:'#ffffff'
})
.then(canvas=>{

const a=document.createElement('a');

a.href=
canvas.toDataURL(
'image/jpeg',
0.96
);

a.download='husnihat.jpg';

a.click();

})
.finally(()=>{

btn.innerHTML='⬇ YUKLAB OLISH';

btn.disabled=false;

});

});

</script>

</body>
</html>
